<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">AI協働基盤.hybrid</title><desc id="desc">複線協働型 / 当面の目標 — directとorchestratedを切替・退避</desc><defs><marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#174ea6"/></marker><marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0b7a53"/></marker><marker id="arrowP" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b3fa0"/></marker><style>text{font-family:Noto Sans JP,Yu Gothic,Meiryo,sans-serif;fill:#172033}.title{font-size:48px;font-weight:700;fill:#16357a}.subtitle{font-size:25px;font-weight:700;fill:#244a92}.node-title{font-size:27px;font-weight:700}.small{font-size:18px}.body{font-size:20px}.badge{font-size:17px;font-weight:700}.edge{font-size:17px;font-weight:700}</style></defs><rect width="1600" height="1000" fill="#fff"/><text x="800" y="62" text-anchor="middle" class="title">AI協働基盤.hybrid</text><text x="800" y="98" text-anchor="middle" class="subtitle">複線協働型 / 当面の目標 — directとorchestratedを切替・退避</text><rect x="35" y="170" width="300" height="240" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="63" y="213" class="node-title" fill="#174ea6">人間（主宰・最終判断）</text><text x="65" y="252" class="small">• 目的設定・優先順位</text><text x="65" y="283" class="small">• 承認・最終責任</text><text x="65" y="314" class="small">• 非言語情報・現場感覚</text><text x="65" y="345" class="small">• 成果物の最終判断</text><rect x="63" y="355" width="244" height="34" rx="9" fill="#fff" stroke="#174ea6" stroke-width="2"/><text x="185" y="379" class="small" text-anchor="middle" fill="#174ea6">原則：GitHubは直接編集しない</text><rect x="35" y="465" width="330" height="270" rx="18" fill="#eaf8f2" stroke="#0b7a53" stroke-width="3"/><text x="63" y="510" class="node-title" fill="#0b7a53">ChatGPT</text><rect x="240" y="481" width="115" height="30" rx="10" fill="#eaf8f2" stroke="#0b7a53" stroke-width="2"/><text x="297.5" y="504" class="badge" text-anchor="middle" fill="#0b7a53">Primary</text><text x="65" y="552" class="small">• 要件整理・SPDD化</text><text x="65" y="583" class="small">• 設計統合・説明</text><text x="65" y="614" class="small">• GitHub直接実装</text><text x="65" y="645" class="small">• 結果統合・判断支援</text><rect x="59" y="680" width="282" height="34" rx="9" fill="#fff" stroke="#5f6b7a" stroke-width="2"/><text x="200" y="704" class="small" text-anchor="middle" fill="#5f6b7a">Alternate: Claude</text><rect x="425" y="335" width="190" height="135" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="520" y="375" class="node-title" text-anchor="middle" fill="#174ea6">経路選択</text><text x="520" y="407" class="small" text-anchor="middle" fill="#5f6b7a">状況に応じて切替</text><text x="520" y="438" class="small" text-anchor="middle" fill="#174ea6">direct / orchestrated</text><rect x="760" y="220" width="430" height="430" rx="22" fill="#fff" stroke="#174ea6" stroke-width="5"/><text x="975" y="275" class="node-title" text-anchor="middle">GitHub（正本・履歴基盤）</text><rect x="788" y="305" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="808" y="332" class="body" fill="#174ea6" font-weight="700">正本</text><text x="808" y="356" class="small" fill="#5f6b7a">仕様・コード・設計・Docs</text><rect x="788" y="383" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="808" y="410" class="body" fill="#174ea6" font-weight="700">決定記録</text><text x="808" y="434" class="small" fill="#5f6b7a">ADR・採否・理由</text><rect x="788" y="461" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="808" y="488" class="body" fill="#174ea6" font-weight="700">議事録</text><text x="808" y="512" class="small" fill="#5f6b7a">検討・レビュー・未解決</text><rect x="788" y="539" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="808" y="566" class="body" fill="#174ea6" font-weight="700">Issue / PR / Commit</text><text x="808" y="590" class="small" fill="#5f6b7a">作業・差分・履歴</text><text x="975" y="627" class="small" text-anchor="middle" fill="#174ea6">全主体が参照する共通基準面</text><rect x="1250" y="170" width="310" height="245" rx="18" fill="#f3edfb" stroke="#6b3fa0" stroke-width="3"/><text x="1405" y="214" class="node-title" text-anchor="middle" fill="#6b3fa0">品質ゲート</text><text x="1278" y="252" class="small">• PRレビュー（人 / AI）</text><text x="1278" y="282" class="small">• CI・関連テスト</text><text x="1278" y="312" class="small">• 正本との整合性</text><text x="1278" y="342" class="small">• 承認条件・マージ条件</text><rect x="1275" y="363" width="260" height="32" rx="9" fill="#fff" stroke="#6b3fa0" stroke-width="2"/><text x="1405" y="386" class="small" text-anchor="middle" fill="#6b3fa0">承認 / 条件付き / 差戻し</text><rect x="1250" y="485" width="310" height="210" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="1405" y="529" class="node-title" text-anchor="middle" fill="#174ea6">GitHub Actions</text><text x="1280" y="567" class="small">• CI実行</text><text x="1280" y="596" class="small">• テスト・Lint</text><text x="1280" y="625" class="small">• 静的解析</text><text x="1280" y="654" class="small">• 結果・レポート</text><rect x="430" y="555" width="255" height="170" rx="18" fill="#eaf8f2" stroke="#0b7a53" stroke-width="3"/><text x="557" y="595" class="body" text-anchor="middle" fill="#0b7a53">Lane B: orchestrated</text><text x="455" y="635" class="small">• runtime</text><text x="455" y="663" class="small">• Codex CLI</text><text x="455" y="691" class="small">• 定型・大量・反復</text><text x="600" y="205" class="node-title" text-anchor="middle" fill="#174ea6">Lane A: direct</text><path d="M335,290 L520,335" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M365,560 L425,410" fill="none" stroke="#0b7a53" stroke-width="4" marker-end="url(#arrowG)"/><text x="405" y="300" class="edge" text-anchor="middle" fill="#174ea6">相談・承認</text><path d="M615,365 C680,300 700,290 760,300" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M615,405 C680,520 700,560 760,560" fill="none" stroke="#0b7a53" stroke-width="4" marker-end="url(#arrowG)"/><text x="688" y="280" class="edge" text-anchor="middle" fill="#174ea6">direct</text><text x="690" y="585" class="edge" text-anchor="middle" fill="#0b7a53">orchestrated</text><path d="M685,635 L760,600" fill="none" stroke="#0b7a53" stroke-width="4" marker-end="url(#arrowG)"/><path d="M1190,330 L1250,330" fill="none" stroke="#6b3fa0" stroke-width="4" marker-end="url(#arrowP)"/><path d="M1250,380 L1190,380" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><path d="M1405,415 L1405,485" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M1450,485 L1450,415" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><path d="M760,250 C650,170 550,170 365,520" fill="none" stroke="#174ea6" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowB)"/><text x="560" y="162" class="edge" text-anchor="middle" fill="#174ea6">制約・混雑・障害時 → directへ退避</text><rect x="30" y="790" width="1540" height="175" rx="16" fill="#fafbfc" stroke="#5f6b7a" stroke-width="2"/><text x="60" y="825" class="node-title" fill="#174ea6">このモードの特徴</text><rect x="60" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="185" y="876" class="small" text-anchor="middle" fill="#174ea6">退避経路</text><rect x="330" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="455" y="876" class="small" text-anchor="middle" fill="#174ea6">可用性向上</text><rect x="600" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="725" y="876" class="small" text-anchor="middle" fill="#174ea6">状況別最適化</text><rect x="870" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="995" y="876" class="small" text-anchor="middle" fill="#174ea6">共通正本</text><text x="60" y="925" class="small" fill="#0b7a53">主な利用場面：通常はdirect、定型大量処理はorchestrated、片系障害時は他方へ退避</text><text x="60" y="952" class="small" fill="#b42318">注意：二重実行防止、担当経路・状態・切替条件の記録が必要</text></svg>