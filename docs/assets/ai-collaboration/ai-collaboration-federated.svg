<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">AI協働基盤.federated</title><desc id="desc">分担協働型 / 将来形 — 役割別プライマリーがGitHub正本を共有</desc><defs><marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#174ea6"/></marker><marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0b7a53"/></marker><marker id="arrowP" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b3fa0"/></marker><style>text{font-family:Noto Sans JP,Yu Gothic,Meiryo,sans-serif;fill:#172033}.title{font-size:48px;font-weight:700;fill:#16357a}.subtitle{font-size:25px;font-weight:700;fill:#244a92}.node-title{font-size:27px;font-weight:700}.small{font-size:18px}.body{font-size:20px}.tiny{font-size:15px}.badge{font-size:17px;font-weight:700}.edge{font-size:17px;font-weight:700}</style></defs><rect width="1600" height="1000" fill="#fff"/><text x="800" y="62" text-anchor="middle" class="title">AI協働基盤.federated</text><text x="800" y="98" text-anchor="middle" class="subtitle">分担協働型 / 将来形 — 役割別プライマリーがGitHub正本を共有</text><rect x="585" y="245" width="430" height="415" rx="22" fill="#fff" stroke="#174ea6" stroke-width="5"/><text x="800" y="300" class="node-title" text-anchor="middle">GitHub（正本・履歴基盤）</text><rect x="613" y="330" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="633" y="357" class="body" fill="#174ea6" font-weight="700">正本</text><text x="633" y="381" class="small" fill="#5f6b7a">仕様・コード・設計・Docs</text><rect x="613" y="408" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="633" y="435" class="body" fill="#174ea6" font-weight="700">決定記録</text><text x="633" y="459" class="small" fill="#5f6b7a">ADR・採否・理由</text><rect x="613" y="486" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="633" y="513" class="body" fill="#174ea6" font-weight="700">議事録</text><text x="633" y="537" class="small" fill="#5f6b7a">検討・レビュー・未解決</text><rect x="613" y="564" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="633" y="591" class="body" fill="#174ea6" font-weight="700">Issue / PR / Commit</text><text x="633" y="615" class="small" fill="#5f6b7a">作業・差分・履歴</text><text x="800" y="637" class="small" text-anchor="middle" fill="#174ea6">全主体が参照する共通基準面</text><rect x="35" y="170" width="300" height="225" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="63" y="213" class="node-title" fill="#174ea6">人間（主宰・最終判断）</text><text x="65" y="252" class="small">• 目的設定・優先順位</text><text x="65" y="283" class="small">• 承認・最終責任</text><text x="65" y="314" class="small">• 非言語情報・現場感覚</text><text x="65" y="345" class="small">• 成果物の最終判断</text><rect x="63" y="340" width="244" height="34" rx="9" fill="#fff" stroke="#174ea6" stroke-width="2"/><text x="185" y="364" class="small" text-anchor="middle" fill="#174ea6">原則：GitHubは直接編集しない</text><rect x="630" y="115" width="340" height="110" rx="18" fill="#f3edfb" stroke="#6b3fa0" stroke-width="3"/><text x="800" y="149" class="node-title" text-anchor="middle" fill="#6b3fa0">品質ゲート</text><text x="800" y="179" class="small" text-anchor="middle">PRレビュー / CI / 正本整合 / 人間承認</text><rect x="654" y="185" width="292" height="26" rx="8" fill="#fff" stroke="#6b3fa0" stroke-width="2"/><text x="800" y="205" class="tiny" text-anchor="middle" fill="#6b3fa0">承認 / 条件付き / 差戻し</text><rect x="1245" y="145" width="300" height="190" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="1395" y="189" class="node-title" text-anchor="middle" fill="#174ea6">GitHub Actions</text><text x="1275" y="227" class="small">• CI実行</text><text x="1275" y="256" class="small">• テスト・Lint</text><text x="1275" y="285" class="small">• 静的解析</text><text x="1275" y="314" class="small">• 結果・レポート</text><rect x="35" y="450" width="320" height="230" rx="18" fill="#eaf8f2" stroke="#0b7a53" stroke-width="3"/><text x="63" y="495" class="node-title" fill="#0b7a53">ChatGPT</text><rect x="230" y="466" width="115" height="30" rx="10" fill="#eaf8f2" stroke="#0b7a53" stroke-width="2"/><text x="287.5" y="489" class="badge" text-anchor="middle" fill="#0b7a53">Primary</text><text x="65" y="537" class="small">• 要件整理・SPDD化</text><text x="65" y="568" class="small">• 設計統合・説明</text><text x="65" y="599" class="small">• GitHub直接実装</text><text x="65" y="630" class="small">• 結果統合・判断支援</text><rect x="59" y="625" width="272" height="34" rx="9" fill="#fff" stroke="#5f6b7a" stroke-width="2"/><text x="195" y="649" class="small" text-anchor="middle" fill="#5f6b7a">Alternate: Claude</text><rect x="35" y="705" width="320" height="180" rx="18" fill="#f3edfb" stroke="#6b3fa0" stroke-width="3"/><text x="195" y="745" class="node-title" text-anchor="middle" fill="#6b3fa0">Claude</text><rect x="220" y="752" width="115" height="30" rx="10" fill="#f3edfb" stroke="#6b3fa0" stroke-width="2"/><text x="277.5" y="775" class="badge" text-anchor="middle" fill="#6b3fa0">Primary</text><text x="65" y="815" class="small">• 独立査読・反証</text><text x="65" y="843" class="small">• 別視点・論理監査</text><rect x="1235" y="400" width="320" height="200" rx="18" fill="#eaf8f2" stroke="#0b7a53" stroke-width="3"/><text x="1395" y="442" class="node-title" text-anchor="middle" fill="#0b7a53">Codex CLI / runtime</text><rect x="1420" y="449" width="115" height="30" rx="10" fill="#eaf8f2" stroke="#0b7a53" stroke-width="2"/><text x="1477.5" y="472" class="badge" text-anchor="middle" fill="#0b7a53">Primary</text><text x="1265" y="515" class="small">• 自動実装・反復修正</text><text x="1265" y="543" class="small">• 状態管理・ログ</text><rect x="1235" y="650" width="320" height="190" rx="18" fill="#fff4e8" stroke="#d86a00" stroke-width="3"/><text x="1395" y="692" class="node-title" text-anchor="middle" fill="#d86a00">Script / Local LLM</text><rect x="1420" y="699" width="115" height="30" rx="10" fill="#fff4e8" stroke="#d86a00" stroke-width="2"/><text x="1477.5" y="722" class="badge" text-anchor="middle" fill="#d86a00">Primary</text><text x="1265" y="765" class="small">• 定型処理・索引</text><text x="1265" y="793" class="small">• ログ整理・軽量処理</text><rect x="520" y="700" width="520" height="145" rx="18" fill="#f7fffb" stroke="#0b7a53" stroke-width="3"/><text x="780" y="742" class="node-title" text-anchor="middle" fill="#0b7a53">図解 / UI / 造形（任意）</text><text x="780" y="780" class="body" text-anchor="middle" fill="#5f6b7a">Figma・画像生成・各種AI</text><path d="M335,275 L585,300" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M585,350 L335,350" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="455" y="258" class="edge" text-anchor="middle" fill="#174ea6">方針 / 状況報告</text><path d="M355,555 L585,500" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M585,550 L355,610" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="460" y="525" class="edge" text-anchor="middle" fill="#174ea6">仕様参照 / PR更新</text><path d="M355,790 L585,600" fill="none" stroke="#6b3fa0" stroke-width="4" marker-end="url(#arrowP)"/><path d="M585,640 L355,840" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="480" y="720" class="edge" text-anchor="middle" fill="#6b3fa0">査読 / 改善案</text><path d="M1015,470 L1235,480" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M1235,540 L1015,540" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="1125" y="450" class="edge" text-anchor="middle" fill="#174ea6">実装 / 結果</text><path d="M1015,610 L1235,720" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M1235,775 L1015,640" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="1130" y="680" class="edge" text-anchor="middle" fill="#174ea6">定型処理 / 索引更新</text><path d="M1015,315 L1245,240" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M800,225 L800,245" fill="none" stroke="#6b3fa0" stroke-width="4" marker-end="url(#arrowP)"/><path d="M780,660 L780,700" fill="none" stroke="#0b7a53" stroke-width="4" marker-end="url(#arrowG)"/><text x="60" y="930" class="body" fill="#174ea6">特徴：役割別主担当 / 単一AI依存を低減 / 交換可能 / GitHubが共通基準 / 分散するほど接続ルールが重要</text><text x="60" y="962" class="small" fill="#b42318">注意：各AIの出力を自動で正本化せず、PR・レビュー・CI・人間承認を共通化する</text></svg>