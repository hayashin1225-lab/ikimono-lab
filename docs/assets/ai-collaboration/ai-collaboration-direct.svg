<rect x="45" y="180" width="310" height="250" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="73" y="223" class="node-title" text-anchor="start" fill="#174ea6">人間（主宰・最終判断）</text><text x="75" y="262" class="small" text-anchor="start">• 目的設定・優先順位</text><text x="75" y="293" class="small" text-anchor="start">• 承認・最終責任</text><text x="75" y="324" class="small" text-anchor="start">• 非言語情報・現場感覚</text><text x="75" y="355" class="small" text-anchor="start">• 成果物の最終判断</text><rect x="73" y="375" width="254" height="34" rx="9" fill="#fff" stroke="#174ea6" stroke-width="2"/><text x="200.0" y="399" class="small" text-anchor="middle" fill="#174ea6">原則：GitHubは直接編集しない</text><rect x="45" y="480" width="340" height="270" rx="18" fill="#eaf8f2" stroke="#0b7a53" stroke-width="3"/><text x="73" y="525" class="node-title" text-anchor="start" fill="#0b7a53">ChatGPT</text><rect x="260" y="496" width="115" height="30" rx="10" fill="#eaf8f2" stroke="#0b7a53" stroke-width="2"/><text x="317.5" y="519" class="badge" text-anchor="middle" fill="#0b7a53">Primary</text><text x="75" y="567" class="small" text-anchor="start">• 要件整理・SPDD化</text><text x="75" y="598" class="small" text-anchor="start">• 設計統合・説明</text><text x="75" y="629" class="small" text-anchor="start">• GitHub直接実装</text><text x="75" y="660" class="small" text-anchor="start">• 結果統合・判断支援</text><rect x="69" y="695" width="292" height="34" rx="9" fill="#fff" stroke="#5f6b7a" stroke-width="2"/><text x="215.0" y="719" class="small" text-anchor="middle" fill="#5f6b7a">Alternate: Claude</text><rect x="580" y="220" width="430" height="440" rx="22" fill="#fff" stroke="#174ea6" stroke-width="5"/><text x="795.0" y="275" class="node-title" text-anchor="middle" fill="#172033">GitHub（正本・履歴基盤）</text><rect x="608" y="305" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="628" y="332" class="body" text-anchor="start" fill="#174ea6" font-weight="700">正本</text><text x="628" y="356" class="small" text-anchor="start" fill="#5f6b7a">仕様・コード・設計・Docs</text><rect x="608" y="383" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="628" y="410" class="body" text-anchor="start" fill="#174ea6" font-weight="700">決定記録</text><text x="628" y="434" class="small" text-anchor="start" fill="#5f6b7a">ADR・採否・理由</text><rect x="608" y="461" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="628" y="488" class="body" text-anchor="start" fill="#174ea6" font-weight="700">議事録</text><text x="628" y="512" class="small" text-anchor="start" fill="#5f6b7a">検討・レビュー・未解決</text><rect x="608" y="539" width="374" height="66" rx="10" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="628" y="566" class="body" text-anchor="start" fill="#174ea6" font-weight="700">Issue / PR / Commit</text><text x="628" y="590" class="small" text-anchor="start" fill="#5f6b7a">作業・差分・履歴</text><text x="795.0" y="637" class="small" text-anchor="middle" fill="#174ea6">全主体が参照する共通基準面</text><rect x="1220" y="180" width="330" height="250" rx="18" fill="#f3edfb" stroke="#6b3fa0" stroke-width="3"/><text x="1385.0" y="224" class="node-title" text-anchor="middle" fill="#6b3fa0">品質ゲート</text><text x="1248" y="262" class="small" text-anchor="start">• PRレビュー（人 / AI）</text><text x="1248" y="292" class="small" text-anchor="start">• CI・関連テスト</text><text x="1248" y="322" class="small" text-anchor="start">• 正本との整合性</text><text x="1248" y="352" class="small" text-anchor="start">• 承認条件・マージ条件</text><rect x="1245" y="378" width="280" height="32" rx="9" fill="#fff" stroke="#6b3fa0" stroke-width="2"/><text x="1385.0" y="401" class="small" text-anchor="middle" fill="#6b3fa0">承認 / 条件付き / 差戻し</text><rect x="1220" y="500" width="330" height="210" rx="18" fill="#eaf2ff" stroke="#174ea6" stroke-width="3"/><text x="1385.0" y="544" class="node-title" text-anchor="middle" fill="#174ea6">GitHub Actions</text><text x="1250" y="582" class="small" text-anchor="start">• CI実行</text><text x="1250" y="611" class="small" text-anchor="start">• テスト・Lint</text><text x="1250" y="640" class="small" text-anchor="start">• 静的解析</text><text x="1250" y="669" class="small" text-anchor="start">• 結果・レポート</text><path d="M200,430 C200,455 210,465 210,480" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M250,480 C250,455 260,445 260,430" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="210" y="458" class="edge" text-anchor="middle" fill="#174ea6">相談・意図 / 報告・提案</text><path d="M385,565 L580,565" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M580,610 L385,610" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="482" y="548" class="edge" text-anchor="middle" fill="#174ea6">実装・更新</text><text x="482" y="638" class="edge" text-anchor="middle" fill="#0b7a53">履歴・差分・レビュー結果</text><path d="M1010,330 L1220,330" fill="none" stroke="#6b3fa0" stroke-width="4" marker-end="url(#arrowP)"/><path d="M1220,385 L1010,385" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="1115" y="313" class="edge" text-anchor="middle" fill="#6b3fa0">PR提出・レビュー依頼</text><text x="1115" y="414" class="edge" text-anchor="middle" fill="#0b7a53">指摘・承認・差戻し</text><path d="M1385,430 L1385,500" fill="none" stroke="#174ea6" stroke-width="4" marker-end="url(#arrowB)"/><path d="M1435,500 L1435,430" fill="none" stroke="#0b7a53" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowG)"/><text x="1350" y="468" class="edge" text-anchor="middle" fill="#174ea6">CI指示</text><text x="1475" y="468" class="edge" text-anchor="middle" fill="#0b7a53">CI結果</text><rect x="30" y="790" width="1540" height="175" rx="16" fill="#fafbfc" stroke="#5f6b7a" stroke-width="2"/><text x="60" y="825" class="node-title" text-anchor="start" fill="#174ea6">このモードの特徴</text><rect x="60" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="185" y="876" class="small" text-anchor="middle" fill="#174ea6">最小依存</text><rect x="330" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="455" y="876" class="small" text-anchor="middle" fill="#174ea6">壊れにくい</text><rect x="600" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="725" y="876" class="small" text-anchor="middle" fill="#174ea6">通常Chatで継続</text><rect x="870" y="845" width="250" height="48" rx="12" fill="#eaf2ff" stroke="#174ea6" stroke-width="2"/><text x="995" y="876" class="small" text-anchor="middle" fill="#174ea6">退避経路</text><text x="60" y="925" class="small" text-anchor="start" fill="#0b7a53">主な利用場面：日常の開発、要件→設計→実装→検証、小〜中規模変更</text><text x="60" y="952" class="small" text-anchor="start" fill="#b42318">注意：長時間無人処理やローカルWindows直接観測には弱い</text></svg>